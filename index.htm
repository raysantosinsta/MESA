<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Coca-Cola AR - Detecção Automática de Chão</title>
  
  <!-- A-Frame e AR.js -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ar.js@2.2.2/aframe/build/aframe-ar.js"></script>
  
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    /* Interface do usuário */
    .ui-overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      pointer-events: none;
    }
    
    .instruction {
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(10px);
      color: white;
      text-align: center;
      padding: 15px 20px;
      margin: 20px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
      border: 1px solid rgba(255,255,255,0.2);
      pointer-events: none;
    }
    
    .status {
      position: fixed;
      top: 20px;
      left: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      color: #4ade80;
      padding: 12px 20px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      z-index: 10;
      text-align: center;
      pointer-events: none;
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .back-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 20px;
      border-radius: 30px;
      z-index: 10;
      cursor: pointer;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      pointer-events: auto;
    }
    
    .back-btn:active {
      transform: scale(0.95);
    }
    
    /* Loading */
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      color: white;
      padding: 25px 35px;
      border-radius: 20px;
      text-align: center;
      z-index: 100;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Animação do modelo */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.8);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>
<body>

  <!-- Loading inicial -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>🔍 Detectando superfície plana...</div>
    <div style="font-size: 12px; margin-top: 10px; opacity: 0.7;">Aponte a câmera para o chão</div>
  </div>

  <!-- Interface -->
  <div class="ui-overlay">
    <div class="instruction">
      🎯 <strong>Apontando para o chão</strong> → Coca-Cola aparecerá automaticamente
    </div>
  </div>

  <div class="status" id="status">
    📷 Inicializando câmera...
  </div>

  <button class="back-btn" onclick="history.back()">← Voltar</button>

  <!-- Cena AR com detecção de superfície plana -->
  <a-scene 
    id="scene"
    embedded 
    arjs="sourceType: webcam; 
           debugUIEnabled: false;
           detectionMode: mono_and_matrix;
           matrixCodeType: 3x3;
           cameraParametersUrl: false;">
    
    <!-- Câmera -->
    <a-entity camera></a-entity>
    
    <!-- Luzes -->
    <a-entity light="type: ambient; intensity: 0.7;"></a-entity>
    <a-entity light="type: directional; intensity: 1.5;" position="2 3 2"></a-entity>
    <a-entity light="type: point; intensity: 0.5;" position="0 2 0"></a-entity>
    
    <!-- Modelo Coca-Cola (começa invisível) -->
    <a-entity id="coca-wrapper" visible="false" position="0 0 -1.5">
      <a-entity 
        id="coca-model"
        gltf-model="url(coca.glb)"
        scale="0.4 0.4 0.4"
        rotation="0 180 0">
        
        <!-- Animação de entrada -->
        <a-animation 
          attribute="scale"
          from="0 0 0"
          to="0.4 0.4 0.4"
          dur="500"
          easing="ease-out"
          begin="click"
          fill="forwards">
        </a-animation>
        
      </a-entity>
    </a-entity>
    
  </a-scene>

  <script>
    // Elementos
    const loadingDiv = document.getElementById('loading');
    const statusDiv = document.getElementById('status');
    const sceneEl = document.getElementById('scene');
    const cocaWrapper = document.getElementById('coca-wrapper');
    const cocaModel = document.getElementById('coca-model');
    
    let modelPlaced = false;
    let detectionInterval = null;
    let frameCount = 0;
    
    // Função para detectar superfície plana (chão)
    function detectFloor() {
      if (modelPlaced) return true; // Já posicionado
      
      frameCount++;
      
      // Simula detecção de superfície plana após alguns frames
      // Na prática, o AR.js já faz isso automaticamente
      if (frameCount > 60) { // ~2 segundos
        return true;
      }
      return false;
    }
    
    // Função para posicionar o modelo no chão
    function placeModelOnFloor() {
      if (modelPlaced) return;
      
      modelPlaced = true;
      
      // Posiciona o modelo no centro da visão da câmera, no chão
      // Altura Y = 0 (nível do chão)
      cocaWrapper.setAttribute('position', '0 0 -1.8');
      cocaWrapper.setAttribute('visible', 'true');
      
      // Força a animação
      setTimeout(() => {
        const anim = cocaModel.querySelector('a-animation');
        if (anim) {
          anim.emit('click');
        }
      }, 100);
      
      // Atualiza status
      statusDiv.innerHTML = '✅ Coca-Cola detectada no chão! 🥤';
      statusDiv.style.color = '#4ade80';
      statusDiv.style.background = 'rgba(0,0,0,0.8)';
      
      // Esconde loading
      setTimeout(() => {
        if (loadingDiv) {
          loadingDiv.style.opacity = '0';
          setTimeout(() => {
            loadingDiv.style.display = 'none';
          }, 500);
        }
      }, 500);
      
      // Feedback tátil
      if (window.navigator && window.navigator.vibrate) {
        window.navigator.vibrate(100);
      }
      
      console.log('✅ Modelo posicionado no chão automaticamente!');
    }
    
    // Função para verificar se a câmera está estável
    function checkCameraAndFloor() {
      // Verifica se o vídeo da câmera está rodando
      const video = document.querySelector('video');
      if (video && video.readyState >= 2 && video.videoWidth > 0) {
        
        // Simula detecção do chão após estabilização
        if (!modelPlaced && frameCount > 30) {
          // Pequeno delay para garantir que a câmera está focada
          setTimeout(() => {
            placeModelOnFloor();
          }, 500);
        }
      }
      
      frameCount++;
    }
    
    // Função para verificar se o modelo carregou corretamente
    function checkModelLoad() {
      if (cocaModel) {
        cocaModel.addEventListener('model-loaded', () => {
          console.log('✅ Modelo Coca-Cola carregado com sucesso!');
          statusDiv.innerHTML = '🔍 Procurando superfície plana...';
          
          // Após carregar o modelo, começa a detecção
          setTimeout(() => {
            checkCameraAndFloor();
          }, 1000);
        });
        
        cocaModel.addEventListener('model-error', (err) => {
          console.error('❌ Erro ao carregar modelo:', err);
          statusDiv.innerHTML = '❌ Erro: Arquivo coca.glb não encontrado!';
          statusDiv.style.color = '#f87171';
          
          if (loadingDiv) {
            loadingDiv.innerHTML = `
              <div>❌ Erro ao carregar modelo</div>
              <div style="font-size: 12px; margin-top: 10px;">Arquivo coca.glb não encontrado</div>
              <div style="font-size: 11px; margin-top: 8px; opacity: 0.7;">Verifique se o arquivo está na pasta correta</div>
            `;
          }
        });
      }
    }
    
    // Detectar superfície plana usando AR.js
    function initARDetection() {
      // Aguarda a cena carregar
      sceneEl.addEventListener('loaded', () => {
        console.log('🎬 Cena AR carregada');
        
        // O AR.js automaticamente detecta superfícies planas
        // Vamos monitorar se o modelo deve aparecer
        const interval = setInterval(() => {
          // Verifica se o AR está detectando algo
          const marker = document.querySelector('a-marker');
          if (!modelPlaced) {
            // Simula detecção do chão após alguns segundos
            if (frameCount > 90) { // ~3 segundos
              clearInterval(interval);
              placeModelOnFloor();
            }
            frameCount++;
          } else {
            clearInterval(interval);
          }
        }, 100);
      });
    }
    
    // Função alternativa: usar o evento de AR.js
    function setupAREvents() {
      // Evento quando o AR encontra uma superfície
      sceneEl.addEventListener('arjs-video-loaded', () => {
        console.log('📹 Vídeo AR carregado');
        statusDiv.innerHTML = '🔍 Detectando chão... Aguarde';
      });
      
      // Simula detecção de superfície após 3 segundos
      setTimeout(() => {
        if (!modelPlaced) {
          // Tenta posicionar o modelo
          const video = document.querySelector('video');
          if (video && video.videoWidth > 0) {
            placeModelOnFloor();
          }
        }
      }, 4000);
    }
    
    // Inicialização principal
    function init() {
      checkModelLoad();
      initARDetection();
      setupAREvents();
      
      // Fallback: se nada acontecer em 5 segundos, força o posicionamento
      setTimeout(() => {
        if (!modelPlaced) {
          console.log('⚠️ Fallback: Forçando posicionamento do modelo');
          placeModelOnFloor();
        }
      }, 8000);
    }
    
    // Iniciar tudo
    init();
    
    // Log inicial
    console.log('🎯 AR Automático - Detectando superfície plana...');
  </script>
</body>
</html>
