<!doctype html>
<html>
<head>
  <title>AR Coca-Cola - Redmi 9S</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-detector.js"></script>
  <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-handler.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #instructions {
      position: absolute;
      top: 15px;
      left: 15px;
      color: white;
      font-family: Arial, sans-serif;
      background: rgba(0,0,0,0.8);
      padding: 15px;
      border-radius: 10px;
      z-index: 100;
      max-width: 300px;
    }
  </style>
</head>
<body>
  <div id="instructions">
    <p><strong>Instruções (Redmi 9S):</strong><br><br>
       1. Aponte a câmera para o chão ou mesa bem iluminada<br>
       2. Toque na tela para colocar a Coca-Cola<br>
       3. Pinch → Zoom<br>
       4. Dois dedos girando → Rotação</p>
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best; videoTexture: true;"
    gesture-detector
    renderer="alpha: true;"
  >
    <a-assets>
      <!-- Remova ou comente o áudio se não tiver o arquivo -->
      <!-- <audio id="heart-sound" src="coracao-som.mp3" preload="auto"></audio> -->
    </a-assets>

    <a-entity camera></a-entity>

    <!-- Cursor de mira (círculo) -->
    <a-entity
      id="reticle"
      geometry="primitive: ring; radiusInner: 0.07; radiusOuter: 0.10;"
      material="color: #00ffcc; shader: flat; transparent: true; opacity: 0.85;"
      position="0 0 -0.6"
      rotation="-90 0 0"
      visible="true"
    ></a-entity>

    <!-- Modelo Coca-Cola -->
    <a-entity
      id="coca-model"
      class="tocavel"
      gesture-handler="enabled: true"
      gltf-model="coca.glb"
      scale="0.01 0.01 0.01"
      position="0 0.05 0"
      rotation="0 0 0"
      visible="false"
      <!-- sound="src: #heart-sound; autoplay: true; loop: true; volume: 0.7;" -->
    ></a-entity>
  </a-scene>

  <script>
    const scene = document.querySelector('a-scene');
    const model = document.getElementById('coca-model');
    const reticle = document.getElementById('reticle');

    scene.addEventListener('loaded', () => {
      console.log('✅ AR.js carregado no Redmi 9S - Toque na tela para colocar');
    });

    // Toque na tela = coloca o modelo na posição do cursor
    scene.addEventListener('click', () => {
      if (model.getAttribute('visible') === 'false') {
        const pos = reticle.getAttribute('position');
        model.setAttribute('position', `${pos.x} ${pos.y + 0.04} ${pos.z}`);
        model.setAttribute('visible', 'true');
        console.log('✅ Modelo colocado!');
      }
    });

    // Clique no modelo para pausar/tocar som (se quiser ativar depois)
    model.addEventListener('click', function() {
      const sound = this.components.sound;
      if (sound) sound.isPlaying ? sound.pause() : sound.play();
    });
  </script>
</body>
</html>
