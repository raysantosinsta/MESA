<!doctype html>
<html>
<head>
  <title>AR Coca-Cola - Redmi 9S</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-detector.js"></script>
  <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-handler.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #instructions {
      position: absolute;
      top: 15px;
      left: 15px;
      color: white;
      font-family: Arial, sans-serif;
      background: rgba(0,0,0,0.85);
      padding: 15px;
      border-radius: 10px;
      z-index: 100;
      max-width: 300px;
    }
  </style>
</head>
<body>
  <div id="instructions">
    <p><strong>Como usar:</strong><br><br>
       1. Aponte para o chão ou mesa bem iluminada<br>
       2. <strong>Arraste o dedo</strong> na tela para mover o círculo<br>
       3. Quando o círculo estiver no chão → <strong>Toque uma vez</strong> para colocar a Coca<br>
       4. Depois use Pinch (dois dedos) para zoom e girar</p>
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best; videoTexture: true;"
    gesture-detector
    renderer="alpha: true;"
  >
    <a-assets>
      <!-- <audio id="heart-sound" src="coracao-som.mp3" preload="auto"></audio> -->
    </a-assets>

    <a-entity camera></a-entity>

    <!-- Cursor de mira (círculo que você move com o dedo) -->
    <a-entity
      id="reticle"
      geometry="primitive: ring; radiusInner: 0.08; radiusOuter: 0.11;"
      material="color: #00ffcc; shader: flat; transparent: true; opacity: 0.9;"
      position="0 0 -0.5"
      rotation="-90 0 0"
      visible="true"
    ></a-entity>

    <!-- Modelo Coca-Cola -->
    <a-entity
      id="coca-model"
      class="tocavel"
      gesture-handler="enabled: true"
      gltf-model="coca.glb"
      scale="0.01 0.01 0.01"
      position="0 0 0"
      rotation="0 0 0"
      visible="false"
    ></a-entity>
  </a-scene>

  <script>
    const scene = document.querySelector('a-scene');
    const model = document.getElementById('coca-model');
    const reticle = document.getElementById('reticle');

    let isPlaced = false;

    scene.addEventListener('loaded', () => {
      console.log('✅ AR.js carregado - Arraste o dedo para mover o círculo');
    });

    // Arrastar o dedo move o cursor
    let lastTouchX = 0;
    let lastTouchY = 0;

    scene.addEventListener('touchstart', (e) => {
      if (isPlaced) return;
      lastTouchX = e.touches[0].clientX;
      lastTouchY = e.touches[0].clientY;
    });

    scene.addEventListener('touchmove', (e) => {
      if (isPlaced) return;
      const deltaX = (e.touches[0].clientX - lastTouchX) * 0.003;
      const deltaY = (e.touches[0].clientY - lastTouchY) * 0.003;

      let pos = reticle.getAttribute('position');
      pos.x += deltaX;
      pos.y -= deltaY;   // inverte Y para ficar natural
      reticle.setAttribute('position', pos);

      lastTouchX = e.touches[0].clientX;
      lastTouchY = e.touches[0].clientY;
    });

    // Toque simples = coloca o modelo
    scene.addEventListener('click', () => {
      if (!isPlaced) {
        const pos = reticle.getAttribute('position');
        model.setAttribute('position', `${pos.x} ${pos.y + 0.05} ${pos.z}`);
        model.setAttribute('visible', 'true');
        isPlaced = true;
        console.log('✅ Coca-Cola colocada!');
      }
    });

    // Clique no modelo para pausar/tocar som (se quiser usar depois)
    model.addEventListener('click', function() {
      const sound = this.components.sound;
      if (sound) sound.isPlaying ? sound.pause() : sound.play();
    });
  </script>
</body>
</html>
