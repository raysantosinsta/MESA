<!doctype html>
<html>
  <head>
    <title>WebAR – Coca Markerless</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-detector.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-handler.js"></script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; }

      #hint {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.6);
        color: #fff;
        font-family: Arial, sans-serif;
        font-size: 14px;
        padding: 10px 22px;
        border-radius: 24px;
        text-align: center;
        pointer-events: none;
        z-index: 20;
        white-space: nowrap;
      }

      #reticle {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 40px; height: 40px;
        border: 2px solid rgba(255,255,255,0.8);
        border-radius: 50%;
        pointer-events: none;
        z-index: 20;
      }
      #reticle::after {
        content: '';
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 6px; height: 6px;
        background: #fff;
        border-radius: 50%;
      }

      /* Botões verticais */
      #vertical-controls {
        position: fixed;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        gap: 12px;
        z-index: 20;
      }
      #vertical-controls button {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        border: none;
        background: rgba(0,0,0,0.6);
        color: #fff;
        font-size: 24px;
        cursor: pointer;
        touch-action: manipulation;
        user-select: none;
      }
      #vertical-controls button:active {
        background: rgba(255,255,255,0.3);
      }
    </style>
  </head>
  <body>

    <div id="hint">Toque na tela para posicionar o modelo</div>
    <div id="reticle"></div>

    <!-- Controles verticais -->
    <div id="vertical-controls">
      <button id="btn-up">▲</button>
      <button id="btn-down">▼</button>
    </div>

    <a-scene
      id="scene"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; precision: medium;"
      gesture-detector
    >
      <a-assets>
        <a-asset-item id="coca-model" src="coca.glb"></a-asset-item>
      </a-assets>

      <a-entity
        id="coca"
        gltf-model="#coca-model"
        scale="0.05 0.05 0.05"
        position="0 -0.5 -1.5"
        rotation="0 0 0"
        gesture-handler="enabled: true"
        visible="true"
      ></a-entity>

      <a-entity camera look-controls></a-entity>
    </a-scene>

    <script>
      AFRAME.registerComponent('drag-place', {
        init: function () {
          this.model       = document.getElementById('coca');
          this.camera      = document.querySelector('[camera]');
          this.hint        = document.getElementById('hint');

          // Estado do drag
          this.dragging    = false;
          this.touchId     = null;          // identifier do toque ativo
          this.lastX       = 0;
          this.lastY       = 0;

          // Posição atual do modelo (mantida em JS para evitar leitura constante do DOM)
          const pos = this.model.getAttribute('position');
          this.modelPos = { x: pos.x, y: pos.y, z: pos.z };

          // Sensibilidade
          this.hSensitivity = 0.008;  // horizontal (x/z)
          this.vSensitivity = 0.008;  // vertical (y) via botões hold

          // Controles verticais (hold para mover)
          this._vertInterval = null;
          this._bindVertical();

          // Eventos de ponteiro unificados (mouse + touch)
          const canvas = document.querySelector('canvas') || document.body;
          canvas.addEventListener('pointerdown',  this._onDown.bind(this),  { passive: false });
          canvas.addEventListener('pointermove',  this._onMove.bind(this),  { passive: false });
          canvas.addEventListener('pointerup',    this._onUp.bind(this));
          canvas.addEventListener('pointercancel',this._onUp.bind(this));
        },

        // ── Início do toque/clique ──────────────────────────────────────────
        _onDown: function (evt) {
          // Ignora se já há um drag ativo ou se é multitouch (gestures)
          if (this.dragging) return;
          if (evt.pointerType === 'touch' && evt.isPrimary === false) return;

          evt.preventDefault();
          this.dragging = true;
          this.pointerId = evt.pointerId;
          this.lastX = evt.clientX;
          this.lastY = evt.clientY;

          // Captura o ponteiro para receber eventos fora do canvas
          try { evt.target.setPointerCapture(evt.pointerId); } catch(e) {}
        },

        // ── Movimento ──────────────────────────────────────────────────────
        _onMove: function (evt) {
          if (!this.dragging || evt.pointerId !== this.pointerId) return;
          evt.preventDefault();

          const dx = evt.clientX - this.lastX;   // delta horizontal na tela
          const dy = evt.clientY - this.lastY;   // delta vertical na tela
          this.lastX = evt.clientX;
          this.lastY = evt.clientY;

          // Direção horizontal da câmera (ignorando componente Y)
          const camObj   = this.camera.object3D;
          const forward  = new THREE.Vector3();
          const right    = new THREE.Vector3();
          camObj.getWorldDirection(forward);
          forward.y = 0;
          forward.normalize();
          right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

          // dx → eixo direita/esquerda   dy (tela) → frente/trás
          this.modelPos.x += right.x   * dx * this.hSensitivity;
          this.modelPos.z += right.z   * dx * this.hSensitivity;
          this.modelPos.x -= forward.x * dy * this.hSensitivity;
          this.modelPos.z -= forward.z * dy * this.hSensitivity;

          this._applyPosition();
        },

        // ── Fim do toque/clique ────────────────────────────────────────────
        _onUp: function (evt) {
          if (evt.pointerId !== this.pointerId) return;
          this.dragging = false;
          this.pointerId = null;
          this.hint.textContent = '▲▼ para subir/descer • Arraste para mover • Pinch para zoom';
        },

        // ── Botões verticais (hold) ────────────────────────────────────────
        _bindVertical: function () {
          const step = 0.04;   // metros por tick
          const tick = 16;     // ms entre ticks (~60 fps)

          const startMove = (dir) => {
            if (this._vertInterval) return;
            this._vertInterval = setInterval(() => {
              this.modelPos.y += dir * step;
              this._applyPosition();
            }, tick);
          };
          const stopMove = () => {
            clearInterval(this._vertInterval);
            this._vertInterval = null;
          };

          const btnUp   = document.getElementById('btn-up');
          const btnDown = document.getElementById('btn-down');

          // Mouse
          btnUp.addEventListener('mousedown',  () => startMove(+1));
          btnDown.addEventListener('mousedown', () => startMove(-1));
          document.addEventListener('mouseup',  stopMove);

          // Touch
          btnUp.addEventListener('touchstart',  (e) => { e.preventDefault(); startMove(+1); }, { passive: false });
          btnDown.addEventListener('touchstart', (e) => { e.preventDefault(); startMove(-1); }, { passive: false });
          btnUp.addEventListener('touchend',    stopMove);
          btnDown.addEventListener('touchend',  stopMove);
        },

        // ── Aplica posição ao modelo ───────────────────────────────────────
        _applyPosition: function () {
          this.model.setAttribute('position', {
            x: this.modelPos.x,
            y: this.modelPos.y,
            z: this.modelPos.z
          });
          // Garante visibilidade
          if (!this.model.getAttribute('visible')) {
            this.model.setAttribute('visible', true);
          }
        }
      });

      document.getElementById('scene').setAttribute('drag-place', '');
    </script>

  </body>
</html>
