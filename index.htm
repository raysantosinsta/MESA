<!doctype html>
<html>
<head>
  <title>WebAR – Oclusão Real</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; }
    #btn-ar {
      position: fixed;
      bottom: 40px; left: 50%;
      transform: translateX(-50%);
      padding: 14px 32px;
      background: #fff;
      border: none;
      border-radius: 32px;
      font-size: 16px;
      font-family: Arial, sans-serif;
      cursor: pointer;
      z-index: 10;
    }
    #info {
      position: fixed;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 14px;
      background: rgba(0,0,0,0.5);
      padding: 8px 18px;
      border-radius: 20px;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="info">Clique em "Entrar em AR" e aponte para uma superfície</div>
  <button id="btn-ar">Entrar em AR</button>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ── Setup básico Three.js ──────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

    // ── Iluminação ─────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const sun = new THREE.DirectionalLight(0xfff5e0, 1.2);
    sun.position.set(2, 6, -3);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 0.1;
    sun.shadow.camera.far  = 20;
    sun.shadow.bias = -0.0005;
    scene.add(sun);

    // ── Plano receptor de sombra ───────────────────────────────────────
    const shadowPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(6, 6),
      new THREE.ShadowMaterial({ opacity: 0.35 })
    );
    shadowPlane.rotation.x = -Math.PI / 2;
    shadowPlane.receiveShadow = true;
    shadowPlane.visible = false; // aparece após hit-test
    scene.add(shadowPlane);

    // ── Modelo 3D ──────────────────────────────────────────────────────
    let model = null;
    new GLTFLoader().load('coca.glb', (gltf) => {
      model = gltf.scene;
      model.scale.setScalar(0.3);
      model.traverse(obj => {
        if (obj.isMesh) {
          obj.castShadow    = true;
          obj.receiveShadow = true;
        }
      });
      model.visible = false; // aparece após primeiro hit-test
      scene.add(model);
    });

    // ── Shader de oclusão por depth sensing ───────────────────────────
    // Este material lê o depthTexture do WebXR e descarta fragmentos
    // onde o ambiente real está mais perto que o modelo virtual.
    const occlusionMaterial = new THREE.ShaderMaterial({
      uniforms: {
        depthTexture:  { value: null },
        uvTransform:   { value: new THREE.Matrix4() },
        resolution:    { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
        cameraNear:    { value: 0.01 },
        cameraFar:     { value: 20.0 }
      },
      vertexShader: `
        varying vec4 vPosition;
        void main() {
          vPosition = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          gl_Position = vPosition;
        }
      `,
      fragmentShader: `
        uniform sampler2D depthTexture;
        uniform mat4      uvTransform;
        uniform vec2      resolution;
        uniform float     cameraNear;
        uniform float     cameraFar;
        varying vec4      vPosition;

        float linearizeDepth(float d) {
          return cameraNear * cameraFar / (cameraFar - d * (cameraFar - cameraNear));
        }

        void main() {
          // UV do fragmento na tela
          vec2 uv = (vPosition.xy / vPosition.w) * 0.5 + 0.5;

          // Aplica transformação de UV do depth sensing
          vec2 depthUV = (uvTransform * vec4(uv, 0.0, 1.0)).xy;

          // Profundidade do ambiente real neste pixel
          float realDepth = texture2D(depthTexture, depthUV).r;

          // Profundidade do fragmento virtual
          float virtualDepth = linearizeDepth(gl_FragCoord.z);

          // Se o ambiente real está mais perto → descarta o fragmento
          if (realDepth < virtualDepth - 0.02) discard;

          gl_FragColor = vec4(0.0, 0.0, 0.0, 0.0);
        }
      `,
      transparent: true,
      depthWrite:  false,
      side: THREE.DoubleSide
    });

    // Plano occluder — mesmo tamanho do shadow plane
    // Fica no mesmo lugar mas aplica o shader de profundidade
    const occluder = new THREE.Mesh(
      new THREE.PlaneGeometry(6, 6),
      occlusionMaterial
    );
    occluder.rotation.x = -Math.PI / 2;
    occluder.visible    = false;
    scene.add(occluder);

    // ── Hit-test (detecta superfícies) ────────────────────────────────
    let xrSession    = null;
    let hitTestSource = null;
    let depthInfo    = null;

    // ── Botão entrar em AR ─────────────────────────────────────────────
    document.getElementById('btn-ar').addEventListener('click', async () => {
      if (!navigator.xr) {
        alert('WebXR não disponível neste navegador.');
        return;
      }

      const supported = await navigator.xr.isSessionSupported('immersive-ar');
      if (!supported) {
        alert('AR não suportado neste dispositivo.');
        return;
      }

      // Solicita sessão com hit-test + depth-sensing
      xrSession = await navigator.xr.requestSession('immersive-ar', {
        requiredFeatures: ['hit-test'],
        optionalFeatures: ['depth-sensing', 'dom-overlay'],
        depthSensing: {
          usagePreference:  ['gpu-optimized'],         // textura na GPU
          dataFormatPreference: ['luminance-alpha']    // formato compatível
        },
        domOverlay: { root: document.body }
      });

      renderer.xr.setSession(xrSession);
      document.getElementById('btn-ar').style.display = 'none';

      // Hit-test source: mira no centro da tela
      const viewerSpace = await xrSession.requestReferenceSpace('viewer');
      hitTestSource = await xrSession.requestHitTestSource({ space: viewerSpace });

      // Loop de renderização
      renderer.setAnimationLoop((timestamp, frame) => {
        if (!frame) return;

        // ── Hit-test: posiciona modelo na superfície ─────────────────
        if (hitTestSource) {
          const hits = frame.getHitTestResults(hitTestSource);
          if (hits.length > 0 && model) {
            const refSpace = renderer.xr.getReferenceSpace();
            const pose     = hits[0].getPose(refSpace);
            const pos      = pose.transform.position;

            model.position.set(pos.x, pos.y, pos.z);
            model.visible       = true;
            shadowPlane.position.set(pos.x, pos.y, pos.z);
            shadowPlane.visible = true;
            occluder.position.set(pos.x, pos.y, pos.z);
            occluder.visible    = true;
          }
        }

        // ── Depth sensing: atualiza uniforms do shader ───────────────
        if (xrSession.depthUsage !== undefined) {
          const pose = frame.getViewerPose(renderer.xr.getReferenceSpace());
          if (pose) {
            const view = pose.views[0];
            depthInfo  = frame.getDepthInformation(view);

            if (depthInfo && depthInfo.texture) {
              occlusionMaterial.uniforms.depthTexture.value  = depthInfo.texture;
              occlusionMaterial.uniforms.uvTransform.value   = depthInfo.normDepthBufferFromNormView.matrix;
              occlusionMaterial.uniforms.cameraNear.value    = camera.near;
              occlusionMaterial.uniforms.cameraFar.value     = camera.far;
            }
          }
        }

        renderer.render(scene, camera);
      });
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
