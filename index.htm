<!DOCTYPE html>
<html>
<head>
  <title>Coca-Cola AR - Sem Marcador</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
    
    .info {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 12px;
      font-family: Arial;
      font-size: 14px;
      z-index: 10;
      pointer-events: none;
    }
    
    .back-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 25px;
      font-size: 14px;
      cursor: pointer;
      z-index: 10;
      font-family: Arial;
    }
  </style>
</head>
<body>

  <div class="info">
    🥤 <strong>Coca-Cola 3D</strong> → O modelo está fixo no centro da tela
  </div>
  
  <button class="back-btn" onclick="history.back()">← Voltar</button>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    
    <!-- Câmera -->
    <a-entity camera></a-entity>
    
    <!-- Luzes -->
    <a-entity light="type: ambient; intensity: 0.7;"></a-entity>
    <a-entity light="type: directional; intensity: 1.2;" position="2 3 2"></a-entity>
    
    <!-- Modelo Coca-Cola - SEM marcador, visível diretamente -->
    <a-entity
      gltf-model="url(coca.glb)"
      scale="0.5 0.5 0.5"
      position="0 0 -1.5"
      rotation="0 180 0"
    >
      <!-- Animação de rotação suave -->
      <a-animation
        attribute="rotation"
        from="0 0 0"
        to="0 360 0"
        dur="15000"
        easing="linear"
        repeat="indefinite">
      </a-animation>
    </a-entity>
    
  </a-scene>

  <script>
    console.log('🎯 AR Iniciado - Coca-Cola 3D visível!');
    
    // Verificar se o modelo carregou
    const model = document.querySelector('[gltf-model="url(coca.glb)"]');
    if (model) {
      model.addEventListener('model-loaded', () => {
        console.log('✅ Coca-Cola carregada!');
      });
      model.addEventListener('model-error', () => {
        alert('Erro: Arquivo coca.glb não encontrado!');
      });
    }
  </script>
</body>
</html>
