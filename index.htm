<!doctype html>
<html>
  <head>
    <title>AR Coca-Cola - Superfície Plana</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-detector.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-handler.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
      #ar-overlay {
        position: absolute;
        top: 10px;
        left: 10px;
        color: white;
        font-family: Arial, sans-serif;
        background: rgba(0,0,0,0.6);
        padding: 12px 15px;
        border-radius: 8px;
        pointer-events: none;
        z-index: 100;
      }
    </style>
  </head>
  <body>
    <div id="ar-overlay">
      <p>Aponte para uma superfície plana bem iluminada<br>
         Pinch → Zoom<br>
         Dois dedos girando → Rotação<br>
         Um dedo arrastando → Mover</p>
    </div>

    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
      gesture-detector
    >
      <a-assets>
        <audio id="heart-sound" src="coracao-som.mp3" preload="auto"></audio>
      </a-assets>

      <a-entity camera></a-entity>

      <!-- Modelo Coca-Cola -->
      <a-entity
        id="coca-model"
        class="tocavel"
        gesture-handler="enabled: true"
        gltf-model="coca.glb"
        scale="0.01 0.01 0.01"        
        position="0 0.05 -0.4"        
        rotation="0 0 0"
        visible="true"
        sound="src: #heart-sound; autoplay: true; loop: true; volume: 0.7; positional: false"
      >
      </a-entity>
    </a-scene>

    <script>
      const model = document.getElementById('coca-model');

      // Clique no modelo para pausar / tocar o som
      model.addEventListener('click', function() {
        const sound = this.components.sound;
        if (sound) {
          sound.isPlaying ? sound.pause() : sound.play();
        }
      });

      console.log('✅ Cena AR iniciada. Aponte para uma mesa ou chão.');
    </script>
  </body>
</html>
