<!doctype html>
<html>
<head>
  <title>AR Coca-Cola - Detecção de Chão</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-detector.js"></script>
  <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-handler.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #ar-overlay {
      position: absolute;
      top: 15px;
      left: 15px;
      color: white;
      font-family: Arial, sans-serif;
      background: rgba(0,0,0,0.85);
      padding: 15px 18px;
      border-radius: 10px;
      pointer-events: none;
      z-index: 100;
      max-width: 300px;
    }
  </style>
</head>
<body>
  <div id="ar-overlay">
    <p><strong>Importante:</strong><br>
       1. Dê permissão da câmera quando pedir<br>
       2. Aponte devagar para o chão ou mesa (bem iluminada)<br>
       3. Quando o círculo aparecer → Toque na tela para colocar a Coca<br>
       Pinch → Zoom | Dois dedos → Rotação</p>
  </div>

  <a-scene
    embedded
    gesture-detector
    renderer="alpha: true;"
    webxr="mode: ar; 
           requiredFeatures: hit-test; 
           optionalFeatures: local-floor; 
           referenceSpaceType: local;"
    xr-mode-ui="enabled: true; XRMode: ar"
    vr-mode-ui="enabled: false"
  >
    <a-assets>
      <audio id="heart-sound" src="coracao-som.mp3" preload="auto"></audio>
    </a-assets>

    <!-- Camera -->
    <a-entity camera></a-entity>

    <!-- Cursor de mira (círculo) -->
    <a-entity
      id="reticle"
      geometry="primitive: ring; radiusInner: 0.06; radiusOuter: 0.09;"
      material="color: #00ffcc; shader: flat; transparent: true; opacity: 0.9;"
      position="0 0 -0.5"
      rotation="-90 0 0"
      visible="false"
    ></a-entity>

    <!-- Modelo Coca-Cola -->
    <a-entity
      id="coca-model"
      class="tocavel"
      gesture-handler="enabled: true"
      gltf-model="coca.glb"
      scale="0.01 0.01 0.01"
      position="0 0.05 0"
      rotation="0 0 0"
      visible="false"
      sound="src: #heart-sound; autoplay: true; loop: true; volume: 0.7; positional: false"
    ></a-entity>
  </a-scene>

  <script>
    const scene = document.querySelector('a-scene');
    const model = document.getElementById('coca-model');
    const reticle = document.getElementById('reticle');

    scene.addEventListener('loaded', () => {
      console.log('✅ Cena AR carregada. Aguardando detecção de superfície...');
    });

    // Quando detectar superfície plana
    scene.addEventListener('ar-hit-test-entered', () => {
      reticle.setAttribute('visible', 'true');
      console.log('✅ Superfície detectada! Toque na tela.');
    });

    scene.addEventListener('ar-hit-test-exited', () => {
      reticle.setAttribute('visible', 'false');
    });

    // Toque na tela para colocar o modelo
    scene.addEventListener('click', () => {
      if (model.getAttribute('visible') === 'false' && reticle.getAttribute('visible') === 'true') {
        const pos = reticle.getAttribute('position');
        model.setAttribute('position', `${pos.x} ${pos.y + 0.04} ${pos.z}`);
        model.setAttribute('visible', 'true');
        console.log('✅ Modelo colocado!');
      }
    });

    // Clique no modelo → pausar/tocar som
    model.addEventListener('click', function() {
      const sound = this.components.sound;
      if (sound) sound.isPlaying ? sound.pause() : sound.play();
    });
  </script>
</body>
</html>
