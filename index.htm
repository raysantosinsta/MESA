<!doctype html>
<html>
  <head>
    <title>AR Coca-Cola - Toque para Colocar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-detector.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-handler.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
      #ar-overlay {
        position: absolute;
        top: 15px;
        left: 15px;
        color: white;
        font-family: Arial, sans-serif;
        background: rgba(0,0,0,0.8);
        padding: 15px 18px;
        border-radius: 10px;
        pointer-events: none;
        z-index: 100;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div id="ar-overlay">
      <p><strong>Instruções:</strong><br>
         1. Aponte para o chão ou mesa bem iluminada<br>
         2. <strong>Toque na tela</strong> para colocar a Coca-Cola<br>
         3. Pinch → Zoom<br>
         4. Dois dedos girando → Rotação<br>
         5. Um dedo arrastando → Mover</p>
    </div>

    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best; videoTexture: true;"
      gesture-detector
      renderer="logarithmicDepthBuffer: true;"
    >
      <a-assets>
        <audio id="heart-sound" src="coracao-som.mp3" preload="auto"></audio>
      </a-assets>

      <!-- Camera -->
      <a-entity camera></a-entity>

      <!-- Cursor de mira (círculo no centro da tela) -->
      <a-entity
        id="reticle"
        geometry="primitive: ring; radiusInner: 0.06; radiusOuter: 0.085;"
        material="color: #00ffcc; shader: flat; transparent: true; opacity: 0.85;"
        position="0 0 -0.5"
        rotation="-90 0 0"
        visible="true"
      ></a-entity>

      <!-- Modelo Coca-Cola -->
      <a-entity
        id="coca-model"
        class="tocavel"
        gesture-handler="enabled: true"
        gltf-model="coca.glb"
        scale="0.01 0.01 0.01"
        position="0 0.05 0"
        rotation="0 0 0"
        visible="false"
        sound="src: #heart-sound; autoplay: true; loop: true; volume: 0.7; positional: false"
      ></a-entity>
    </a-scene>

    <script>
      const scene = document.querySelector('a-scene');
      const model = document.getElementById('coca-model');
      const reticle = document.getElementById('reticle');

      scene.addEventListener('loaded', () => {
        console.log('✅ AR carregado. Aponte para o chão e toque na tela para colocar.');
      });

      // Ao tocar na tela → coloca o modelo na posição do cursor
      scene.addEventListener('click', (evt) => {
        if (model.getAttribute('visible') === 'false') {
          const pos = reticle.getAttribute('position');
          model.setAttribute('position', `${pos.x} ${pos.y + 0.02} ${pos.z}`); // +0.02 para não afundar
          model.setAttribute('visible', 'true');
          console.log('✅ Modelo colocado!');
        }
      });

      // Clique no modelo para pausar/tocar o som
      model.addEventListener('click', function() {
        const sound = this.components.sound;
        if (sound) {
          sound.isPlaying ? sound.pause() : sound.play();
        }
      });
    </script>
  </body>
</html>
