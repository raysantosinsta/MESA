<!doctype html>
<html>
<head>
  <title>AR Coca-Cola - Fixo no Chão</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-detector.js"></script>
  <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-handler.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #instructions {
      position: absolute;
      top: 15px;
      left: 15px;
      color: white;
      font-family: Arial, sans-serif;
      background: rgba(0,0,0,0.85);
      padding: 15px;
      border-radius: 10px;
      z-index: 100;
      max-width: 320px;
    }
  </style>
</head>
<body>
  <div id="instructions">
    <p><strong>Como usar:</strong><br><br>
       1. Aponte para o chão ou mesa bem iluminada<br>
       2. <strong>Arraste o dedo</strong> para mover o círculo azul<br>
       3. Quando o círculo estiver bem posicionado → <strong>Toque uma vez</strong> (sem segurar)<br>
       4. O modelo ficará fixo no lugar!</p>
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best; videoTexture: true;"
    gesture-detector
    renderer="alpha: true;"
  >
    <a-assets></a-assets>

    <a-entity camera></a-entity>

    <!-- Cursor de mira (você move com o dedo) -->
    <a-entity
      id="reticle"
      geometry="primitive: ring; radiusInner: 0.07; radiusOuter: 0.10;"
      material="color: cyan; shader: flat; transparent: true; opacity: 0.9;"
      position="0 0 -0.5"
      rotation="-90 0 0"
      visible="true"
    ></a-entity>

    <!-- Modelo Coca-Cola (vai ficar fixo no mundo) -->
    <a-entity
      id="coca-model"
      class="tocavel"
      gesture-handler="enabled: true"
      gltf-model="coca.glb"
      scale="0.01 0.01 0.01"
      position="0 0 0"
      rotation="0 0 0"
      visible="false"
    ></a-entity>
  </a-scene>

  <script>
    const scene = document.querySelector('a-scene');
    const model = document.getElementById('coca-model');
    const reticle = document.getElementById('reticle');

    let modelPlaced = false;

    scene.addEventListener('loaded', () => {
      console.log('✅ Pronto - Arraste para mover o círculo');
    });

    // === MOVIMENTAÇÃO DO CURSOR COM O DEDO ===
    let lastX = 0;
    let lastY = 0;

    scene.addEventListener('touchstart', (e) => {
      if (modelPlaced) return;
      lastX = e.touches[0].clientX;
      lastY = e.touches[0].clientY;
    });

    scene.addEventListener('touchmove', (e) => {
      if (modelPlaced) return;

      const deltaX = (e.touches[0].clientX - lastX) * 0.004;
      const deltaY = (e.touches[0].clientY - lastY) * 0.004;

      let pos = reticle.getAttribute('position');
      pos.x += deltaX;
      pos.y -= deltaY;        // Y invertido para movimento natural
      pos.z = -0.5;           // mantém distância fixa da câmera

      reticle.setAttribute('position', pos);

      lastX = e.touches[0].clientX;
      lastY = e.touches[0].clientY;
    });

    // === COLOCAR O MODELO ===
    scene.addEventListener('click', () => {
      if (!modelPlaced) {
        const reticlePos = reticle.getAttribute('position');
        
        // Posiciona o modelo exatamente onde está o círculo + um pouco acima do chão
        model.setAttribute('position', `${reticlePos.x} ${reticlePos.y + 0.06} ${reticlePos.z}`);
        model.setAttribute('visible', 'true');
        
        modelPlaced = true;
        console.log('✅ Modelo colocado e fixo no lugar!');
      }
    });

    // Clique no modelo para pausar/tocar som (opcional)
    model.addEventListener('click', function() {
      const sound = this.components.sound;
      if (sound) {
        sound.isPlaying ? sound.pause() : sound.play();
      }
    });
  </script>
</body>
</html>
