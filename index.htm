<!doctype html>
<html>
  <head>
    <title>WebAR – Coca Markerless</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <!-- AR.js (location + markerless) -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

    <!-- Gesture support (pinch zoom + rotate) -->
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-detector.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-handler.js"></script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; }

      #overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 10;
      }

      #hint {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.55);
        color: #fff;
        font-family: Arial, sans-serif;
        font-size: 14px;
        padding: 10px 20px;
        border-radius: 24px;
        text-align: center;
        pointer-events: none;
        z-index: 20;
        transition: opacity 0.5s;
      }

      #reticle {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 40px; height: 40px;
        border: 2px solid rgba(255,255,255,0.8);
        border-radius: 50%;
        pointer-events: none;
        z-index: 20;
      }
      #reticle::after {
        content: '';
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 6px; height: 6px;
        background: #fff;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>

    <div id="hint">Aponte a câmera para uma superfície plana e toque para posicionar</div>
    <div id="reticle"></div>

    <a-scene
      id="scene"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; precision: medium;"
      gesture-detector
    >
      <a-assets>
        <a-asset-item id="coca-model" src="coca.glb"></a-asset-item>
      </a-assets>

      <!-- Modelo posicionado à frente da câmera inicialmente -->
      <a-entity
        id="coca"
        gltf-model="#coca-model"
        scale="0.1 0.1 0.1"
        position="0 -0.5 -1.5"
        rotation="0 0 0"
        gesture-handler="enabled: true"
        visible="true"
      ></a-entity>

      <a-entity camera look-controls></a-entity>
    </a-scene>

    <script>
      AFRAME.registerComponent('tap-to-place', {
        init: function () {
          this.model = document.getElementById('coca');
          this.camera = document.querySelector('[camera]');
          this.placed = false;
          this.hint = document.getElementById('hint');

          // Escuta toque/clique na cena
          document.addEventListener('click', this.onTap.bind(this));
          document.addEventListener('touchend', this.onTap.bind(this));
        },

        onTap: function (evt) {
          // Ignora eventos de multiponto (pinch/rotate do gesture-handler)
          if (evt.touches && evt.touches.length > 1) return;

          const camera = this.camera;
          const model = this.model;

          // Pega a direção para onde a câmera está apontando
          const direction = new THREE.Vector3();
          camera.object3D.getWorldDirection(direction);

          // Pega a posição mundial da câmera
          const camPos = new THREE.Vector3();
          camera.object3D.getWorldPosition(camPos);

          // Projeta o ponto no "chão" (y = 0) ao longo da direção da câmera
          // Distância fixa de 1.5m se não houver detecção de plano
          let targetPos;

          if (direction.y !== 0) {
            // Raio da câmera até o plano y=0 (chão)
            const t = -camPos.y / direction.y;
            if (t > 0 && t < 5) {
              // Ponto está à frente e a menos de 5 m
              targetPos = new THREE.Vector3(
                camPos.x + direction.x * t,
                0,
                camPos.z + direction.z * t
              );
            }
          }

          // Fallback: coloca 1.5m à frente na mesma altura que a câmera
          if (!targetPos) {
            targetPos = new THREE.Vector3(
              camPos.x + direction.x * 1.5,
              camPos.y - 0.5,
              camPos.z + direction.z * 1.5
            );
          }

          // Aplica posição ao modelo
          model.setAttribute('position', {
            x: targetPos.x,
            y: targetPos.y,
            z: targetPos.z
          });

          // Atualiza hint após primeiro posicionamento
          if (!this.placed) {
            this.placed = true;
            this.hint.textContent = 'Toque para reposicionar • Pinch para zoom • 2 dedos para girar';
          }
        }
      });

      // Ativa o componente na cena
      document.getElementById('scene').setAttribute('tap-to-place', '');
    </script>

  </body>
</html>
