<!doctype html>
<html>
  <head>
    <title>AR Coca-Cola - Toque para Colocar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-detector.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-handler.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
      #ar-overlay {
        position: absolute;
        top: 10px;
        left: 10px;
        color: white;
        font-family: Arial, sans-serif;
        background: rgba(0,0,0,0.75);
        padding: 15px;
        border-radius: 10px;
        pointer-events: none;
        z-index: 100;
        max-width: 280px;
      }
    </style>
  </head>
  <body>
    <div id="ar-overlay">
      <p><strong>Aponte para o chão ou mesa bem iluminada</strong><br><br>
         Toque na tela → Colocar Coca-Cola<br>
         Pinch → Zoom<br>
         Dois dedos → Rotação<br>
         Um dedo arrastando → Mover</p>
    </div>

    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best; videoTexture: true;"
      gesture-detector
    >
      <a-assets>
        <audio id="heart-sound" src="coracao-som.mp3" preload="auto"></audio>
      </a-assets>

      <!-- Camera -->
      <a-entity camera></a-entity>

      <!-- Cursor de mira (círculo no centro) -->
      <a-entity
        id="reticle"
        geometry="primitive: ring; radiusInner: 0.07; radiusOuter: 0.09;"
        material="color: #00ffff; shader: flat; transparent: true; opacity: 0.8;"
        position="0 0 -0.6"
        rotation="-90 0 0"
        visible="true"
      ></a-entity>

      <!-- Modelo Coca-Cola -->
      <a-entity
        id="coca-model"
        class="tocavel"
        gesture-handler="enabled: true"
        gltf-model="coca.glb"
        scale="0.01 0.01 0.01"
        position="0 0.05 0"
        rotation="0 0 0"
        visible="false"
        sound="src: #heart-sound; autoplay: true; loop: true; volume: 0.7; positional: false"
      ></a-entity>
    </a-scene>

    <script>
      const scene = document.querySelector('a-scene');
      const model = document.getElementById('coca-model');
      const reticle = document.getElementById('reticle');

      scene.addEventListener('loaded', () => {
        console.log('✅ AR carregado - Aponte para o chão e toque na tela');
      });

      // Toque na tela = coloca o modelo na posição atual do cursor
      scene.addEventListener('click', () => {
        if (model.getAttribute('visible') === 'false') {
          const reticlePos = reticle.getAttribute('position');
          model.setAttribute('position', `${reticlePos.x} ${reticlePos.y} ${reticlePos.z}`);
          model.setAttribute('visible', 'true');
          console.log('✅ Modelo colocado na superfície!');
        }
      });

      // Clique no modelo para pausar/tocar o som
      model.addEventListener('click', function() {
        const sound = this.components.sound;
        if (sound) {
          sound.isPlaying ? sound.pause() : sound.play();
        }
      });
    </script>
  </body>
</html>
