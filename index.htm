<!doctype html>
<html>
<head>
  <title>AR Coca-Cola - Detecção de Chão</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- Gestos (pinch + rotação) -->
  <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-detector.js"></script>
  <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-handler.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #ar-overlay {
      position: absolute;
      top: 15px;
      left: 15px;
      color: white;
      font-family: Arial, sans-serif;
      background: rgba(0,0,0,0.8);
      padding: 15px 18px;
      border-radius: 10px;
      pointer-events: none;
      z-index: 100;
      max-width: 300px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="ar-overlay">
    <p><strong>Aponte para o chão ou mesa bem iluminada</strong><br><br>
       Toque na tela → Colocar Coca-Cola<br>
       Pinch com dois dedos → Zoom<br>
       Girar com dois dedos → Rotação<br>
       Arrastar com um dedo → Mover</p>
  </div>

  <a-scene
    embedded
    gesture-detector
    webxr="optionalFeatures: hit-test, local-floor;"
    renderer="logarithmicDepthBuffer: true;"
  >
    <a-assets>
      <audio id="heart-sound" src="coracao-som.mp3" preload="auto"></audio>
    </a-assets>

    <!-- Camera -->
    <a-entity camera></a-entity>

    <!-- Cursor de mira (reticle) - aparece quando detecta superfície -->
    <a-entity
      id="reticle"
      geometry="primitive: ring; radiusInner: 0.07; radiusOuter: 0.10;"
      material="color: #00ffcc; shader: flat; transparent: true; opacity: 0.9;"
      position="0 0 -0.5"
      rotation="-90 0 0"
      visible="false"
    ></a-entity>

    <!-- Modelo Coca-Cola -->
    <a-entity
      id="coca-model"
      class="tocavel"
      gesture-handler="enabled: true"
      gltf-model="coca.glb"
      scale="0.01 0.01 0.01"
      position="0 0.05 0"
      rotation="0 0 0"
      visible="false"
      sound="src: #heart-sound; autoplay: true; loop: true; volume: 0.7; positional: false"
    ></a-entity>
  </a-scene>

  <script>
    const scene = document.querySelector('a-scene');
    const model = document.getElementById('coca-model');
    const reticle = document.getElementById('reticle');

    let hitTestEnabled = true;

    scene.addEventListener('loaded', () => {
      console.log('✅ Cena carregada - Iniciando detecção de superfície...');
    });

    // Hit-test automático (WebXR)
    scene.addEventListener('ar-hit-test-entered', () => {
      reticle.setAttribute('visible', 'true');
      console.log('✅ Superfície detectada! Toque na tela para colocar.');
    });

    scene.addEventListener('ar-hit-test-exited', () => {
      reticle.setAttribute('visible', 'false');
    });

    // Ao tocar na tela → coloca o modelo
    scene.addEventListener('click', () => {
      if (model.getAttribute('visible') === 'false' && reticle.getAttribute('visible') === 'true') {
        const reticlePos = reticle.getAttribute('position');
        model.setAttribute('position', `${reticlePos.x} ${reticlePos.y + 0.03} ${reticlePos.z}`);
        model.setAttribute('visible', 'true');
        console.log('✅ Coca-Cola colocada no chão!');
      }
    });

    // Clique no modelo para pausar/tocar som
    model.addEventListener('click', function () {
      const sound = this.components.sound;
      if (sound) {
        sound.isPlaying ? sound.pause() : sound.play();
      }
    });
  </script>
</body>
</html>
