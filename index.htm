<html>
<head>
  <title>Meu Projeto AR - Superfície Plana</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>body{margin:0; overflow:hidden;}</style>
</head>
<body>
  <a-scene embedded arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
    
    <!-- Sistema de rastreamento de superfície plana -->
    <a-entity camera></a-entity>
    
    <!-- Modelo que aparece ao detectar superfície plana -->
    <a-entity 
      gltf-model="url(coca.glb)"
      scale="0.5 0.5 0.5"
      position="0 0 0"
      rotation="0 0 0"
      visible="true"
      id="modelo-coca">
    </a-entity>
    
    <!-- Indicador visual para toque (opcional) -->
    <a-entity 
      id="touch-indicator"
      geometry="primitive: circle; radius: 0.1"
      material="color: red; opacity: 0.6"
      position="0 0 0"
      visible="false">
    </a-entity>
    
  </a-scene>
  
  <script>
    // Configuração para detectar toques na tela e posicionar o modelo
    const scene = document.querySelector('a-scene');
    const modelo = document.getElementById('modelo-coca');
    const indicador = document.getElementById('touch-indicator');
    
    // Função para posicionar o modelo onde o usuário tocar
    scene.addEventListener('click', function(event) {
      // Pega a posição do toque em coordenadas da tela
      const mouseX = event.clientX;
      const mouseY = event.clientY;
      
      // Cria um raycast para encontrar a superfície plana
      const raycaster = new THREE.Raycaster();
      const camera = document.querySelector('[camera]').object3D;
      
      // Converte coordenadas da tela para coordenadas 3D
      const mouseVector = new THREE.Vector2();
      mouseVector.x = (mouseX / window.innerWidth) * 2 - 1;
      mouseVector.y = -(mouseY / window.innerHeight) * 2 + 1;
      
      raycaster.setFromCamera(mouseVector, camera);
      
      // Verifica interseções com o plano do chão virtual
      const planeGeometry = new THREE.PlaneGeometry(10, 10);
      const planeMaterial = new THREE.MeshBasicMaterial({ visible: false });
      const groundPlane = new THREE.Mesh(planeGeometry, planeMaterial);
      groundPlane.position.y = 0;
      groundPlane.rotation.x = -Math.PI / 2;
      scene.object3D.add(groundPlane);
      
      const intersects = raycaster.intersectObject(groundPlane);
      
      if (intersects.length > 0) {
        const point = intersects[0].point;
        
        // Posiciona o modelo no ponto de interseção
        modelo.setAttribute('position', `${point.x} ${point.y + 0.2} ${point.z}`);
        
        // Mostra indicador de toque temporariamente
        indicador.setAttribute('visible', 'true');
        indicador.setAttribute('position', `${point.x} ${point.y + 0.05} ${point.z}`);
        
        setTimeout(() => {
          indicador.setAttribute('visible', 'false');
        }, 500);
        
        // Adiciona animação suave
        modelo.setAttribute('animation', {
          property: 'scale',
          from: '0 0 0',
          to: '0.5 0.5 0.5',
          dur: 300,
          easing: 'ease-out'
        });
      }
      
      scene.object3D.remove(groundPlane);
    });
    
    // Opcional: Adiciona instruções na tela
    const instructions = document.createElement('div');
    instructions.innerHTML = 'Toque na tela para posicionar o modelo Coca-Cola em qualquer superfície plana';
    instructions.style.position = 'fixed';
    instructions.style.bottom = '20px';
    instructions.style.left = '0';
    instructions.style.right = '0';
    instructions.style.textAlign = 'center';
    instructions.style.backgroundColor = 'rgba(0,0,0,0.7)';
    instructions.style.color = 'white';
    instructions.style.padding = '10px';
    instructions.style.fontFamily = 'Arial, sans-serif';
    instructions.style.fontSize = '14px';
    instructions.style.zIndex = '1000';
    document.body.appendChild(instructions);
    
    // Remove instruções após 5 segundos
    setTimeout(() => {
      instructions.style.opacity = '0';
      setTimeout(() => instructions.remove(), 1000);
    }, 5000);
  </script>
</body>
</html>
