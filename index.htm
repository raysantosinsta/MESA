<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>AR - Coca-Cola em Superfície Plana</title>
  
  <!-- A-Frame e AR.js -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ar.js@2.2.2/aframe/build/aframe-ar.min.js"></script>
  
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
    }
    
    /* Instruções na tela */
    .instructions {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 12px;
      font-size: 14px;
      z-index: 1000;
      backdrop-filter: blur(5px);
      pointer-events: none;
    }
    
    /* Botão para resetar posição */
    .reset-btn {
      position: fixed;
      bottom: 80px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: bold;
      z-index: 1000;
      cursor: pointer;
      backdrop-filter: blur(5px);
      transition: all 0.3s ease;
    }
    
    .reset-btn:active {
      transform: scale(0.95);
    }
    
    /* Indicador de toque */
    .tap-indicator {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      border: 2px solid white;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      z-index: 1000;
      pointer-events: none;
      display: none;
      animation: pulse 0.5s ease-out;
    }
    
    @keyframes pulse {
      0% {
        transform: translate(-50%, -50%) scale(0.5);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) scale(1.5);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  
  <!-- Cena AR com detecção de superfície plana -->
  <a-scene 
    embedded 
    arjs="sourceType: webcam; 
           debugUIEnabled: false;
           detectionMode: mono_and_matrix;
           matrixCodeType: 3x3;">
    
    <!-- Câmera -->
    <a-entity camera></a-entity>
    
    <!-- Luzes para melhor visualização do modelo -->
    <a-entity light="type: ambient; intensity: 0.8;"></a-entity>
    <a-entity light="type: directional; intensity: 1.5;" position="1 2 1"></a-entity>
    <a-entity light="type: point; intensity: 0.5;" position="0 1 0"></a-entity>
    
    <!-- Modelo Coca-Cola - aparece ao tocar na superfície -->
    <a-entity id="coca-model" visible="false">
      <a-entity 
        id="coca-gltf"
        gltf-model="url(coca.glb)"
        scale="0.5 0.5 0.5"
        rotation="0 0 0">
      </a-entity>
    </a-entity>
    
  </a-scene>
  
  <!-- Elementos UI -->
  <div class="instructions">
    👆 Toque em qualquer superfície plana para posicionar a Coca-Cola 3D
  </div>
  
  <button class="reset-btn" id="resetBtn">
    🔄 Resetar Posição
  </button>
  
  <div class="tap-indicator" id="tapIndicator"></div>
  
  <script>
    // Elementos
    const scene = document.querySelector('a-scene');
    const cocaModel = document.getElementById('coca-model');
    const resetBtn = document.getElementById('resetBtn');
    const tapIndicator = document.getElementById('tapIndicator');
    
    let currentModelPosition = null;
    let modelPlaced = false;
    
    // Função para mostrar indicador de toque
    function showTapIndicator(x, y) {
      tapIndicator.style.left = x + 'px';
      tapIndicator.style.top = y + 'px';
      tapIndicator.style.display = 'block';
      setTimeout(() => {
        tapIndicator.style.display = 'none';
      }, 500);
    }
    
    // Função para posicionar o modelo
    function placeModel(screenX, screenY) {
      // Mostra indicador visual
      showTapIndicator(screenX, screenY);
      
      // Obtém a câmera do A-Frame
      const camera = document.querySelector('[camera]').object3D;
      
      // Cria um raycaster para detectar a superfície
      const raycaster = new THREE.Raycaster();
      const mouseVector = new THREE.Vector2();
      
      // Converte coordenadas da tela para coordenadas normalizadas (-1 a 1)
      mouseVector.x = (screenX / window.innerWidth) * 2 - 1;
      mouseVector.y = -(screenY / window.innerHeight) * 2 + 1;
      
      // Configura o raycaster a partir da câmera
      raycaster.setFromCamera(mouseVector, camera);
      
      // Cria um plano virtual no chão (Y = 0)
      const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
      const targetPoint = new THREE.Vector3();
      
      // Calcula a interseção do raio com o plano
      if (raycaster.ray.intersectPlane(groundPlane, targetPoint)) {
        // Posiciona o modelo no ponto de interseção
        cocaModel.setAttribute('visible', 'true');
        cocaModel.setAttribute('position', `${targetPoint.x} ${targetPoint.y + 0.1} ${targetPoint.z}`);
        
        // Adiciona animação de entrada
        const modelEntity = document.getElementById('coca-gltf');
        modelEntity.setAttribute('animation', {
          property: 'scale',
          from: '0 0 0',
          to: '0.5 0.5 0.5',
          dur: 400,
          easing: 'ease-out'
        });
        
        currentModelPosition = { x: targetPoint.x, y: targetPoint.y + 0.1, z: targetPoint.z };
        modelPlaced = true;
        
        // Feedback tátil (se disponível)
        if (window.navigator && window.navigator.vibrate) {
          window.navigator.vibrate(50);
        }
        
        console.log(`Modelo posicionado em: X=${targetPoint.x}, Y=${targetPoint.y + 0.1}, Z=${targetPoint.z}`);
      } else {
        console.log('Nenhuma superfície plana detectada nessa posição');
        // Feedback visual de erro
        cocaModel.setAttribute('visible', 'false');
      }
    }
    
    // Evento de toque/clique na tela
    scene.addEventListener('click', (event) => {
      // Pega as coordenadas do clique
      const rect = scene.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      
      // Posiciona o modelo
      placeModel(event.clientX, event.clientY);
    });
    
    // Evento touch para dispositivos móveis
    scene.addEventListener('touchstart', (event) => {
      event.preventDefault();
      if (event.touches.length > 0) {
        const touch = event.touches[0];
        placeModel(touch.clientX, touch.clientY);
      }
    });
    
    // Botão resetar
    resetBtn.addEventListener('click', () => {
      cocaModel.setAttribute('visible', 'false');
      modelPlaced = false;
      currentModelPosition = null;
      
      // Feedback visual
      resetBtn.style.transform = 'scale(0.95)';
      setTimeout(() => {
        resetBtn.style.transform = 'scale(1)';
      }, 200);
      
      console.log('Posição resetada');
    });
    
    // Ajusta o modelo para sempre ficar na superfície (opcional)
    function updateModelPosition() {
      if (modelPlaced && currentModelPosition) {
        // Mantém o modelo na mesma posição relativa
        cocaModel.setAttribute('position', 
          `${currentModelPosition.x} ${currentModelPosition.y} ${currentModelPosition.z}`);
      }
    }
    
    // Atualiza a cada frame
    function animate() {
      updateModelPosition();
      requestAnimationFrame(animate);
    }
    animate();
    
    // Log de inicialização
    console.log('AR pronto! Toque na tela para posicionar o modelo Coca-Cola');
    
    // Instrução adicional para dispositivos iOS
    setTimeout(() => {
      const instructions = document.querySelector('.instructions');
      instructions.style.opacity = '0.7';
      setTimeout(() => {
        instructions.style.opacity = '1';
      }, 3000);
    }, 2000);
  </script>
</body>
</html>
